<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CoPaw — Works for you, grows with you.</title>
    <link rel="icon" href="/copaw-symbol.svg" type="image/svg+xml" />
    <link
      rel="preload"
      href="/font/NotoSerifSC.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/font/NotoSansSC.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <!-- Google tag (gtag.js) -->
    <script>
      (function () {
        // Initialize dataLayer and gtag function
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        window.gtag = gtag;

        // Pre-configure GA (will be applied when script loads)
        gtag("js", new Date());
        gtag("config", "G-BEX1XSB9KE");

        // Delayed loading of GA script
        let gaLoaded = false;

        function loadGA() {
          if (gaLoaded) return;
          gaLoaded = true;

          const script = document.createElement("script");
          script.async = true;
          script.src =
            "https://www.googletagmanager.com/gtag/js?id=G-BEX1XSB9KE";
          document.head.appendChild(script);
        }

        // Strategy 1: Load immediately on user interaction (fastest user behavior capture)
        const events = ["mousedown", "touchstart", "keydown", "scroll"];
        events.forEach(function (event) {
          document.addEventListener(event, loadGA, {
            once: true,
            passive: true,
            capture: true,
          });
        });

        // Strategy 2: Load after page load with delay
        if (document.readyState === "complete") {
          setTimeout(loadGA, 2000);
        } else {
          window.addEventListener("load", function () {
            setTimeout(loadGA, 2000);
          });
        }

        // Strategy 3: Use requestIdleCallback (if supported)
        if ("requestIdleCallback" in window) {
          requestIdleCallback(loadGA, { timeout: 3000 });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
